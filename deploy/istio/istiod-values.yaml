meshConfig:
  accessLogFile: /dev/stdout
  extensionProviders:
    - name: reactive-mesh-http-authz
      envoyExtAuthzHttp:
        service: baseline-authz.reactive-mesh-authz.svc.cluster.local
        port: "9191"
        includeHeadersInCheck:
          - authorization
          - x-sub
          - x-sid
          - x-jti
          - content-type
          - te
          - user-agent
          - grpc-timeout
        headersToUpstreamOnAllow:
          - authorization
          - x-current-source
          - x-matched-identifiers
        headersToDownstreamOnDeny:
          - content-type

apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: receiver
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: receiver
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: grpc-server
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: grpc-server
  ports:
    - port: 50051
      targetPort: 50051
---
apiVersion: v1
kind: Service
metadata:
  name: baseline-authz
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: baseline-authz
  ports:
    - port: 9191
      targetPort: 9191
---
apiVersion: v1
kind: Service
metadata:
  name: envoy
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: envoy
  ports:
    - name: grpc
      port: 8081
      targetPort: 8081
    - name: admin
      port: 9901
      targetPort: 9901

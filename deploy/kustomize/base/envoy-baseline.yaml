apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy-baseline
  namespace: reactive-mesh-authz
spec:
  replicas: 1
  selector:
    matchLabels:
      app: envoy-baseline
  template:
    metadata:
      labels:
        app: envoy-baseline
    spec:
      containers:
        - name: envoy
          image: reactive-mesh/envoy-baseline:dev
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/envoy"]
          args: ["-c", "/etc/envoy/envoy.yaml", "--log-level", "info"]
          ports:
            - containerPort: 8081
            - containerPort: 9901
          volumeMounts:
            - name: config
              mountPath: /etc/envoy
      volumes:
        - name: config
          configMap:
            name: envoy-baseline-config
---
apiVersion: v1
kind: Service
metadata:
  name: envoy-baseline
  namespace: reactive-mesh-authz
spec:
  type: NodePort
  selector:
    app: envoy-baseline
  ports:
    - name: grpc
      port: 8081
      targetPort: 8081
      nodePort: 30082
    - name: admin
      port: 9901
      targetPort: 9901
      nodePort: 30902

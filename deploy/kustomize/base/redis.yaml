apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: reactive-mesh-authz
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: reactive-mesh/redis:dev
          imagePullPolicy: IfNotPresent
          args: ["redis-server", "--bind", "0.0.0.0", "--protected-mode", "no", "--save", "", "--appendonly", "no"]
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: reactive-mesh-authz
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379

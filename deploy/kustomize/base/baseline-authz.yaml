apiVersion: apps/v1
kind: Deployment
metadata:
  name: baseline-authz
  namespace: reactive-mesh-authz
spec:
  replicas: 1
  selector:
    matchLabels:
      app: baseline-authz
  template:
    metadata:
      labels:
        app: baseline-authz
    spec:
      containers:
        - name: baseline-authz
          image: reactive-mesh/baseline-authz:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: REDIS_ADDR
              value: redis:6379
            - name: LISTEN_ADDR
              value: 0.0.0.0:9191
            - name: BASELINE_MODE
              value: poll
            - name: POLL_INTERVAL_MS
              value: "1000"
          ports:
            - containerPort: 9191
---
apiVersion: v1
kind: Service
metadata:
  name: baseline-authz
  namespace: reactive-mesh-authz
spec:
  selector:
    app: baseline-authz
  ports:
    - port: 9191
      targetPort: 9191

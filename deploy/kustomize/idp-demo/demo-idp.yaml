apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-idp
  namespace: reactive-mesh-authz
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-idp
  template:
    metadata:
      labels:
        app: demo-idp
    spec:
      containers:
        - name: demo-idp
          image: reactive-mesh/demo-idp:v2
          imagePullPolicy: IfNotPresent
          env:
            - name: DEMO_IDP_ISSUER
              value: http://demo-idp:8080/realms/reactive-mesh
            - name: DEMO_IDP_REALM
              value: reactive-mesh
            - name: DEMO_IDP_CLIENT_ID
              value: reactive-mesh-cli
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: demo-idp
  namespace: reactive-mesh-authz
spec:
  selector:
    app: demo-idp
  ports:
    - name: http
      port: 8080
      targetPort: 8080

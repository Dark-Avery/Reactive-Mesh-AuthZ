apiVersion: apps/v1
kind: Deployment
metadata:
  name: openfga
  namespace: reactive-mesh-authz
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openfga
  template:
    metadata:
      labels:
        app: openfga
    spec:
      containers:
        - name: openfga
          image: reactive-mesh/openfga:v1.12.1-dev
          imagePullPolicy: IfNotPresent
          args:
            - run
            - --playground-enabled=false
            - --datastore-engine=memory
            - --http-addr=0.0.0.0:8080
            - --grpc-addr=0.0.0.0:8081
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 8081
              name: grpc
---
apiVersion: v1
kind: Service
metadata:
  name: openfga
  namespace: reactive-mesh-authz
spec:
  selector:
    app: openfga
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: grpc
      port: 8081
      targetPort: 8081
